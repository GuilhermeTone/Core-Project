services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/
    container_name: app
    volumes:
      - ./:/var/www
    depends_on:
      - redis
    networks:
      - laravel
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - mysql_db
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  mysql_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_docker
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

  redis:
    image: redis:7.0
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
